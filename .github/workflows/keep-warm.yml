name: Keep Render backend warm

# Render's free tier spins the backend down after 15 minutes without
# traffic; the next request then takes ~30-60s (cold start). This
# workflow pings the health endpoint every 10 minutes so the service
# stays warm. Runs only on the schedule or when triggered manually.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          curl -sf --max-time 90 https://optibook-backend.onrender.com/api/health
          echo "Backend is up"
